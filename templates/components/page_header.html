<div class="page-header">
  <div>
    <h1>{{ page_title }}</h1>
    <p>{{ page_description }}</p>
  </div>
  <div class="page-actions">
    {% if primary_action and create_url %}<a class="btn btn-primary" href="{{ create_url }}">{{ primary_action }}</a>{% elif primary_action %}<button class="btn btn-primary" type="button" data-toast="该页面暂未配置新增入口。">{{ primary_action }}</button>{% endif %}
  </div>
</div>

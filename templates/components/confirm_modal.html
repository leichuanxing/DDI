<div class="modal-mask" id="confirmModal" hidden>
  <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <h3 id="confirmTitle">请确认操作</h3>
    <p id="confirmText">该操作需要二次确认。</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" type="button" data-confirm-cancel>取消</button>
      <button class="btn btn-danger" type="button" data-confirm-ok>确认</button>
    </div>
  </div>
</div>

{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>{{ page_title }}</h1>
    <p>{{ page_description }}</p>
  </div>
  <div class="page-actions">
    <a class="btn btn-ghost" href="{{ back_url }}">返回列表</a>
  </div>
</div>

<form class="card form-card" method="post" novalidate>
  {% csrf_token %}
  <div class="card-header"><h2>{{ form_title }}</h2></div>
  <div class="card-body">
    <div class="field">
      <label class="required" for="direction">解析方向</label>
      <select id="direction" name="direction" data-dns-direction>
        <option value="forward" {% if direction != "reverse" %}selected{% endif %}>正向解析</option>
        <option value="reverse" {% if direction == "reverse" %}selected{% endif %}>反向解析（PTR）</option>
      </select>
    </div>

    <div class="field" data-forward-field>
      <label for="zone_id">选择 Zone</label>
      <select id="zone_id" name="zone_id">
        <option value="">使用新 Zone</option>
        {% for zone in zones %}
          <option value="{{ zone.id }}" {% if record and record.zone_id == zone.id %}selected{% endif %}>{{ zone.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" data-forward-field>
      <label for="zone_name">Zone 名称</label>
      <input id="zone_name" name="zone_name" value="{% if record %}{{ record.zone.name }}{% endif %}" placeholder="devnets.net">
      <span class="help-text">选择已有 Zone 时可留空。</span>
    </div>
    <div class="field" data-forward-field>
      <label class="required" for="record_type">记录类型</label>
      <select id="record_type" name="record_type">
        {% for item in forward_record_types %}
          <option value="{{ item }}" {% if record and record.record_type == item %}selected{% endif %}>{{ item }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field" data-forward-field>
      <label class="required" for="name">记录名称</label>
      <input id="name" name="name" value="{% if record and record.record_type != 'PTR' %}{{ record.name }}{% endif %}" placeholder="www 或 @">
    </div>
    <div class="field" data-forward-field>
      <label class="required" for="content">记录内容</label>
      <input id="content" name="content" value="{% if record and record.record_type != 'PTR' %}{{ record.content }}{% endif %}" placeholder="IP、别名、文本或目标主机">
    </div>

    <div class="field" data-reverse-field>
      <label class="required" for="ip_address">反向解析 IP</label>
      <input id="ip_address" name="ip_address" placeholder="192.168.31.10">
      <span class="help-text">系统会自动生成反向 Zone，例如 31.168.192.in-addr.arpa。</span>
    </div>
    <div class="field" data-reverse-field>
      <label class="required" for="target">PTR 指向</label>
      <input id="target" name="target" value="{% if record and record.record_type == 'PTR' %}{{ record.content }}{% endif %}" placeholder="host.devnets.net">
    </div>

    <div class="field">
      <label class="required" for="ttl">TTL</label>
      <input id="ttl" name="ttl" type="number" min="0" value="{{ record.ttl|default:3600 }}">
    </div>
    <div class="field" data-forward-field>
      <label for="priority">MX 优先级</label>
      <input id="priority" name="priority" type="number" min="0" value="{{ record.priority|default:10 }}">
    </div>
    <div class="field">
      <label>状态</label>
      <label style="display:flex;align-items:center;min-height:36px;font-weight:500">
        <input type="checkbox" name="disabled" {% if record and record.disabled %}checked{% endif %}>
        禁用该记录
      </label>
    </div>
    <div class="field">
      <label for="comment">备注</label>
      <textarea id="comment" name="comment">{{ record.comment|default:"" }}</textarea>
    </div>
  </div>
  <div class="form-footer">
    <a class="btn btn-ghost" href="{{ back_url }}">取消</a>
    <button class="btn btn-primary" type="submit">保存</button>
  </div>
</form>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  const direction = document.querySelector("[data-dns-direction]");
  if (!direction) return;
  const sync = function () {
    const reverse = direction.value === "reverse";
    document.querySelectorAll("[data-forward-field]").forEach((node) => { node.style.display = reverse ? "none" : ""; });
    document.querySelectorAll("[data-reverse-field]").forEach((node) => { node.style.display = reverse ? "" : "none"; });
  };
  direction.addEventListener("change", sync);
  sync();
})();
</script>
{% endblock %}

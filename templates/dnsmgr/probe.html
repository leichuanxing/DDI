{% extends 'base.html' %}
{% load static %}

{% block title %}服务探测 - DDI系统{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-3">
    <!-- 页面标题 + 新建任务按钮 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 fw-bold">
            <i class="bi bi-radar text-primary me-2"></i>服务探测
        </h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newTaskModal">
            <i class="bi bi-plus-circle me-1"></i>新建探测任务
        </button>
    </div>

    <!-- 任务统计 -->
    <div class="row g-2 mb-3">
        <div class="col-md-3">
            <div class="card bg-light border-0 h-100">
                <div class="card-body text-center py-2">
                    <h5 class="mb-0 fw-bold text-primary" id="statTotal">0</h5>
                    <small class="text-muted">运行中任务</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-light border-0 h-100">
                <div class="card-body text-center py-2">
                    <h5 class="mb-0 fw-bold text-success" id="statReachable">0</h5>
                    <small class="text-muted">健康</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-light border-0 h-100">
                <div class="card-body text-center py-2">
                    <h5 class="mb-0 fw-bold text-warning" id="statTimeout">0</h5>
                    <small class="text-muted">超时/不可达</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-light border-0 h-100">
                <div class="card-body text-center py-2">
                    <h5 class="mb-0 fw-bold text-danger" id="statError">0</h5>
                    <small class="text-muted">异常</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 探测任务列表（每行一个任务） -->
    <div id="taskContainer">
        <!-- 空状态提示 -->
        <div id="emptyState" class="card border-dashed text-center py-5">
            <div class="card-body">
                <i class="bi bi-radar display-1 text-muted opacity-25"></i>
                <p class="mt-3 mb-1 text-muted">暂无探测任务，正在加载...</p>
                <p class="text-muted small mb-3">点击上方「新建探测任务」开始监控主机端口状态</p>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 新建任务弹窗 ==================== -->
<div class="modal fade" id="newTaskModal" tabindex="-1" aria-labelledby="newTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary bg-opacity-10">
                <h5 class="modal-title" id="newTaskModalLabel">
                    <i class="bi bi-plus-circle me-1"></i>新建探测任务
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="newTaskForm" onsubmit="return createTask(event)">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-tag me-1"></i>任务名称 <span class="text-danger">*</span></label>
                        <input type="text" name="task_name" id="inputTaskName" class="form-control"
                               placeholder="如：Web服务器监控、DB探测" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-pc-display me-1"></i>目标地址 <span class="text-danger">*</span></label>
                        <input type="text" name="target_ip" id="inputTargetIp" class="form-control"
                               placeholder="IP地址或主机名，如 192.168.1.1" required autofocus>
                        <div class="form-text">支持 IPv4、IPv6 或域名</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-hdd-network me-1"></i>服务端口 <span class="text-danger">*</span></label>
                        <input type="number" name="port" id="inputPort" class="form-control"
                               placeholder="端口号，如 22, 80, 443" min="1" max="65535" required value="22">
                        <div class="d-flex flex-wrap gap-1 mt-1">
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="setPort(22)">SSH:22</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="setPort(53)">DNS:53</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="setPort(80)">HTTP:80</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="setPort(443)">HTTPS:443</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="setPort(3306)">MySQL:3306</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="setPort(3389)">RDP:3389</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="setPort(6379)">Redis:6379</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-clock-history me-1"></i>探测间隔（秒） <span class="text-danger">*</span></label>
                        <input type="number" name="interval" id="inputInterval" class="form-control"
                               placeholder="探测间隔时间" min="5" max="3600" required value="10">
                        <div class="form-text">最短 5 秒，建议根据实际需求设置（过短可能影响目标服务）</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary" id="createTaskBtn">
                        <i class="bi bi-play-circle me-1"></i>启动探测
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ==================== 编辑任务弹窗 ==================== -->
<div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning bg-opacity-10">
                <h5 class="modal-title" id="editTaskModalLabel">
                    <i class="bi bi-pencil-square me-1"></i>编辑探测任务
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editTaskForm" onsubmit="return saveEdit(event)">
                <div class="modal-body">
                    <input type="hidden" id="editDbId" value="">
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-tag me-1"></i>任务名称 <span class="text-danger">*</span></label>
                        <input type="text" name="task_name" id="editTaskName" class="form-control"
                               placeholder="如：Web服务器监控、DB探测" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-pc-display me-1"></i>目标地址 <span class="text-danger">*</span></label>
                        <input type="text" name="target_ip" id="editTargetIp" class="form-control"
                               placeholder="IP地址或主机名，如 192.168.1.1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-hdd-network me-1"></i>服务端口 <span class="text-danger">*</span></label>
                        <input type="number" name="port" id="editPort" class="form-control"
                               placeholder="端口号，如 22, 80, 443" min="1" max="65535" required>
                        <div class="d-flex flex-wrap gap-1 mt-1">
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="document.getElementById('editPort').value=22">SSH:22</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="document.getElementById('editPort').value=53">DNS:53</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="document.getElementById('editPort').value=80">HTTP:80</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="document.getElementById('editPort').value=443">HTTPS:443</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="document.getElementById('editPort').value=3306">MySQL:3306</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="document.getElementById('editPort').value=3389">RDP:3389</button>
                            <button type="button" class="btn btn-xs btn-outline-secondary port-preset" onclick="document.getElementById('editPort').value=6379">Redis:6379</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-clock-history me-1"></i>探测间隔（秒） <span class="text-danger">*</span></label>
                        <input type="number" name="interval" id="editInterval" class="form-control"
                               placeholder="探测间隔时间" min="5" max="3600" required>
                        <div class="form-text">最短 5 秒</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-warning" id="saveEditBtn">
                        <i class="bi bi-check-lg me-1"></i>保存修改
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>


<style>
.border-dashed { border: 2px dashed #dee2e6 !important; background-color: #f8f9fa; }

/* 单行任务条 */
.task-row {
    display: flex;
    align-items: center;
    padding: .5rem .75rem;
    margin-bottom: 6px;
    border-radius: .375rem;
    background-color: #fff;
    border-left: 4px solid #dee2e6;
    transition: all .25s ease;
}
.task-row:hover { box-shadow: 0 1px 8px rgba(0,0,0,.12); }
.task-row.running { border-left-color: #198754; }
.task-row.warning { border-left-color: #ffc107; }
.task-row.danger  { border-left-color: #dc3545; }
.task-row.stopped { border-left-color: #6c757d; opacity: .65; }
.task-row.paused  { border-left-color: #fd7e14; opacity: .8; }

/* 状态指示灯 */
.status-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    margin-right: 4px; flex-shrink: 0;
}
.status-dot.reachable { background-color: #198754; box-shadow: 0 0 5px #198754; animation: blink-green 2s infinite; }
.status-dot.timeout   { background-color: #ffc107; }
.status-dot.error     { background-color: #dc3545; }
.status-dot.probing   { background-color: #6c757d; animation: blink-gray 1s infinite; }
.status-dot.stopped   { background-color: #adb5bd; }

@keyframes blink-green { 50% { opacity: .5; } }
@keyframes blink-gray { 50% { opacity: .3; } }

/* 各列宽度 */
.col-target   { flex: 1; min-width: 0; }
.col-actions   { min-width: 160px; text-align: right; flex-shrink: 0; }

/* 健康状态徽章 */
.health-badge {
    font-size: .78rem; padding: .15em .6em; border-radius: 1em; white-space: nowrap;
}
.health-badge.healthy   { background-color: rgba(25,135,84,.1); color: #198754; border: 1px solid #bce0c9; font-weight: 600; }
.health-badge.unhealthy { background-color: rgba(220,53,69,.08); color: #dc3545; border: 1px solid #f1aebc; font-weight: 600; }
.health-badge.stopped   { background-color: rgba(108,117,125,.08); color: #6c757d; border: 1px solid #c4c8cb; }

.btn-xs { padding: 1px 7px; font-size: 11.5px; border-radius: 4px; }
.port-preset { cursor: pointer; transition: transform .1s; }
.port-preset:hover { transform: scale(1.05); }
</style>

<script>
// ============ 全局状态管理 ============
var tasks = {};
var timers = {};
var PROBE_API = '{% url "dnsmgr:service_probe_api" %}';
var TASK_API_BASE = '{% url "dnsmgr:probe_task_list" %}';
var TASK_API_CREATE = '{% url "dnsmgr:probe_task_create" %}';

function getCSRFToken() {
    var meta = document.querySelector('[name=csrfmiddlewaretoken]');
    return meta ? meta.value : '';
}

function setPort(port) { document.getElementById('inputPort').value = port; }

function taskApiUrl(id) {
    return '/dns/probe/tasks/' + id + '/';
}

// ============ 页面加载：从数据库恢复所有任务 ============
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('emptyState').querySelector('p:first-of-type').textContent = '正在从数据库加载...';
    fetch(TASK_API_BASE, { headers: {'X-CSRFToken': getCSRFToken()} })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var list = data.tasks || [];
            if (list.length === 0) {
                document.getElementById('emptyState').querySelector('p:first-of-type').textContent = '暂无探测任务';
                return;
            }
            for (var i = 0; i < list.length; i++) {
                restoreTask(list[i]);
            }
            document.getElementById('emptyState').classList.add('d-none');
            updateGlobalStats();
        })
        .catch(function(err) {
            console.error('加载任务失败:', err);
            document.getElementById('emptyState').querySelector('p:first-of-type').textContent = '加载失败，请刷新重试';
        });
});

// ============ 从数据库恢复单个任务 ============
function restoreTask(data) {
    var dbId = data.id;
    tasks[dbId] = {
        dbId: dbId,
        name: data.name,
        target: data.target,
        port: data.port,
        interval: data.interval,
        status: 'probing',
        lastResult: null,
        history: [],
        startTime: new Date(),
        running: false,
        paused: false,
    };

    if (data.lastStatus) {
        tasks[dbId].lastResult = {
            status: data.lastStatus,
            latency_ms: data.lastLatency != null ? data.lastLatency : -1,
            message: data.lastMessage || '',
        };
    }

    renderTaskRow(dbId);
    document.getElementById('emptyState').classList.add('d-none');

    if (data.status === 'running') {
        tasks[dbId].running = true;
        startProbeLoop(dbId);
    } else if (data.status === 'paused') {
        tasks[dbId].paused = true;
        tasks[dbId].running = true;
        startProbeLoopPaused(dbId);
        setTaskRowClass(dbId, 'paused');
    } else {
        setTaskRowClass(dbId, 'stopped');
        if (data.lastStatus) handleProbeResult(dbId, tasks[dbId].lastResult, true);
    }
}

// ============ 创建新任务 ============
function createTask(e) {
    e.preventDefault();
    var name   = document.getElementById('inputTaskName').value.trim();
    var ip     = document.getElementById('inputTargetIp').value.trim();
    var port   = parseInt(document.getElementById('inputPort').value);
    var interval = parseInt(document.getElementById('inputInterval').value);

    if (!name) { alert('请输入任务名称'); return false; }
    if (!ip) { alert('请输入目标地址'); return false; }
    if (!port || port < 1 || port > 65535) { alert('请输入有效端口(1-65535)'); return false; }
    if (!interval || interval < 5) { alert('探测间隔不能小于5秒'); document.getElementById('inputInterval').value = 5; return false; }

    var btn = document.getElementById('createTaskBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>创建中...';

    // 1. 先关闭弹窗、重置表单（在请求发出前就做）
    var modalEl = document.getElementById('newTaskModal');
    try {
        var modalInstance = bootstrap.Modal.getInstance(modalEl);
        if (modalInstance) modalInstance.hide();
    } catch(eModal) {
        console.warn('关闭弹窗失败', eModal);
    }

    // 2. 发送创建请求
    fetch(TASK_API_CREATE, {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken()},
        body: JSON.stringify({name: name, target: ip, port: port, interval: interval})
    }).then(function(resp){
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-play-circle me-1"></i>启动探测';
        return resp.json();  // 无论HTTP状态都解析JSON
    })
      .then(function(data){
          if (data.error) { alert(data.error); return; }

          var dbId = data.id;
          console.log('任务创建成功，DB ID:', dbId);

          tasks[dbId] = {
              dbId: dbId, name: name, target: ip, port: port, interval: interval,
              status: 'probing', lastResult: null, history: [],
              startTime: new Date(), running: true, paused: false,
          };

          // 重置表单
          document.getElementById('newTaskForm').reset();
          document.getElementById('inputInterval').value = 10;
          document.getElementById('inputPort').value = 22;

          // 渲染行
          renderTaskRow(dbId);
          document.getElementById('emptyState').classList.add('d-none');

          // 启动探测循环
          startProbeLoop(dbId);
          updateGlobalStats();
      })
      .catch(function(err){
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-play-circle me-1"></i>启动探测';
          console.error('创建任务失败:', err);
          alert('创建失败: ' + err.message);
      });

    return false;
}

// ============ 渲染任务行（简洁：只显示健康状态） ============
function renderTaskRow(taskId) {
    var t = tasks[taskId];
    if (!t) return;

    // 初始健康徽章
    var healthText = '探测中';
    var healthClass = 'unhealthy';
    if (t.lastResult) {
        if (t.lastResult.status === 'reachable') { healthText = '\u2713 健康'; healthClass = 'healthy'; }
        else { healthText = '\u2717 异常'; healthClass = 'unhealthy'; }
    }

    var html =
        '<div class="task-row shadow-sm" id="task-' + t.dbId + '">' +
          '<div class="col-target d-flex align-items-center me-auto">' +
            '<span class="status-dot probing" id="dot-' + t.dbId + '"></span>' +
            '<div class="ms-2 overflow-hidden">' +
              '<strong style="font-size:.88rem;white-space:nowrap;" title="' + t.name + '">' + t.name + '</strong>' +
              '&nbsp;<code class="text-muted" style="font-size:.72rem;">' + t.target + ':' + t.port + '</code>' +
            '</div>' +
          '</div>' +
          '<div class="me-3">' +
            '<span class="health-badge ' + healthClass + '" id="badgeStatus-' + t.dbId + '">' + healthText + '</span>' +
          '</div>' +
          '<div class="col-actions">' +
            '<button class="btn btn-outline-success btn-sm" id="pauseBtn-' + t.dbId + '" onclick="togglePause(' + t.dbId + ')" title="暂停/恢复">' +
              '<i class="bi bi-pause-fill"></i></button>' +
            '&nbsp;<button class="btn btn-outline-warning btn-sm" onclick="stopProbe(' + t.dbId + ')" title="停止探测" id="stopBtn-' + t.dbId + '">' +
              '<i class="bi bi-stop-fill"></i></button>' +
            '&nbsp;<button class="btn btn-outline-primary btn-sm" onclick="openEditModal(' + t.dbId + ')" title="编辑任务">' +
              '<i class="bi bi-pencil-fill"></i></button>' +
            '&nbsp;<button class="btn btn-outline-danger btn-sm" onclick="deleteTask(' + t.dbId + ')" title="删除任务">' +
              '<i class="bi bi-trash-fill"></i></button>' +
          '</div>' +
        '</div>';

    var container = document.getElementById('taskContainer');
    var emptyState = document.getElementById('emptyState');
    var tempDiv = document.createElement('div');
    tempDiv.innerHTML = html;
    container.insertBefore(tempDiv.firstElementChild, emptyState);
}

// ============ 探测循环 ============
function startProbeLoop(taskId) {
    var t = tasks[taskId];
    if (!t) return;

    doProbe(taskId);
    timers[taskId] = setInterval(function() {
        t = tasks[taskId];
        if (!t || !t.running) return;
        if (t.running && !t.paused) doProbe(taskId);
    }, t.interval * 1000);
}

function startProbeLoopPaused(taskId) {
    var t = tasks[taskId];
    if (!t) return;
    timers[taskId] = setInterval(function() {}, t.interval * 1000); // 占位定时器
}

function doProbe(taskId) {
    var t = tasks[taskId];
    if (!t || t.paused) return;
    setTaskStatus(taskId, 'probing');
    fetch(PROBE_API + '?ip=' + encodeURIComponent(t.target) + '&port=' + t.port + '&timeout=3',
          { method:'GET', headers:{'X-CSRFToken':getCSRFToken()} })
        .then(function(r){ return r.json(); })
        .then(function(d){ handleProbeResult(taskId, d, false); })
        .catch(function(err){ handleProbeResult(taskId, {status:'error', latency_ms:-1, message:'请求失败:'+err.message}, false); });
}

// ============ 处理结果 + 回写数据库 ============
function handleProbeResult(taskId, data, skipDbSave) {
    var t = tasks[taskId]; if(!t)return;

    t.lastResult = data;
    t.history.push(data); if(t.history.length > 30) t.history.shift();

    setTaskStatus(taskId, data.status);
    updateGlobalStats();

    if (!skipDbSave && t.dbId) {
        saveProbeResultToDb(t.dbId, data);
    }
}

function saveProbeResultToDb(dbId, data) {
    fetch(taskApiUrl(dbId), {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken()},
        body: JSON.stringify({
            status: data.status,
            latency_ms: data.latency_ms,
            message: data.message || '',
        }),
    }).then(function(r){
        if (!r.ok) console.warn('[ProbeDB] 保存HTTP错误:', r.status);
    }).catch(function(e){ console.error('[ProbeDB] 保存探测结果到DB失败:', e); });
}

// ============ UI更新（只显示健康状态） ============
function setTaskStatus(taskId, status) {
    var dot=document.getElementById('dot-'+taskId), badge=document.getElementById('badgeStatus-'+taskId),
        row=document.getElementById('task-'+taskId);
    if(!dot || !badge)return;
    dot.className='status-dot '+status;

    switch(status){
        case'reachable':
            badge.className='health-badge healthy';
            badge.innerHTML = '\u2713 健康';
            setTaskRowClass(taskId, 'running'); break;
        case'timeout':case'unreachable':case'refused':case'dns_fail':case'error':
            badge.className='health-badge unhealthy';
            badge.innerHTML = '\u2717 异常';
            setTaskRowClass(taskId, (status==='timeout'||status==='unreachable') ? 'warning' : 'danger'); break;
        case'stopped':
            dot.className='status-dot stopped';
            badge.className='health-badge stopped';
            badge.innerHTML = '\u5df2\u505c\u6b62';
            setTaskRowClass(taskId, 'stopped'); break;
        default:
            badge.className='health-badge unhealthy';
            badge.innerHTML = '\u63a2\u6d4b\u4e2d...';
            break;
    }
}

function setTaskRowClass(taskId, cls) {
    var row = document.getElementById('task-' + taskId);
    if (!row) return;
    row.className = row.className.replace(/\b(running|warning|danger|stopped|paused)\b/g, '');
    row.classList.add(cls);
}

function updateGlobalStats(){
    var total=Object.keys(tasks).length,r=0,to=0,err=0;
    for(var tid in tasks){var tr=tasks[tid];if(tr.lastResult){if(tr.lastResult.status==='reachable')r++;else if(tr.lastResult.status==='timeout'||tr.lastResult.status==='unreachable')to++;else err++;}}
    setTextIfExist('statTotal',total); setTextIfExist('statReachable',r); setTextIfExist('statTimeout',to); setTextIfExist('statError',err);
}

function setTextIfExist(id,text){
    var el=document.getElementById(id); if(el){el.innerHTML=text;}
}

// ============ 操作（同步DB） ============
function togglePause(taskId) {
    var t = tasks[taskId]; if(!t)return; var btn=document.getElementById('pauseBtn-'+taskId);

    var isPauseNow = !t.paused;
    var action = isPauseNow ? 'pause' : 'resume';

    fetch(taskApiUrl(t.dbId), {
        method: 'PUT',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken()},
        body: JSON.stringify({action: action}),
    }).then(function(r){ return r.json(); })
      .then(function(d){
          t.paused = isPauseNow;
          if(isPauseNow){
              if(btn){btn.innerHTML='<i class="bi bi-play-fill"></i>';btn.title='\u6062\u590d';}
              setTaskRowClass(taskId, 'paused');
              var b=document.getElementById('badgeStatus-'+taskId);
              if(b){b.className='health-badge unhealthy';b.innerHTML='\u5DF2\u6682\u505C';}
          } else {
              if(btn){btn.innerHTML='<i class="bi bi-pause-fill"></i>';btn.title='\u6682\u505C';}
          }
      })
      .catch(function(err){ alert('\u64CD\u4F5C\u5931\u8D25: '+err.message); });
}

function stopTask(taskId){
    if(!confirm('\u786E\u5B9A\u5220\u9664\u8BE5\u63A2\u6D4B\u4EFB\u52A1?'))return;
    var t = tasks[taskId]; if(!t) return;

    if(timers[taskId]){clearInterval(timers[taskId]);delete timers[taskId];}
    delete tasks[taskId];
    var el=document.getElementById('task-'+taskId); if(el)el.remove();

    fetch(taskApiUrl(t.dbId), {
        method: 'DELETE',
        headers:{'X-CSRFToken':getCSRFToken()}
    }).catch(function(e){ console.warn('\u5220\u9664DB\u4EFB\u52A1\u5931\u8D25:', e); });

    if(Object.keys(tasks).length===0)document.getElementById('emptyState').classList.remove('d-none');
    updateGlobalStats();
}

// ========== 停止探测（不删除任务）==========
function stopProbe(taskId){
    var t = tasks[taskId]; if(!t)return;

    // 停掉定时器
    if(timers[taskId]){clearInterval(timers[taskId]);delete timers[taskId];}
    t.running = false;
    t.paused = false;

    // 同步到后端
    fetch(taskApiUrl(t.dbId), {
        method: 'PUT',
        headers:{'Content-Type':'application/json','X-CSRFToken':getCSRFToken()},
        body: JSON.stringify({action:'stop'})
    }).then(function(r){return r.json();})
      .then(function(d){
          var btn=document.getElementById('stopBtn-'+taskId);
          if(btn){btn.disabled=true;btn.title='已停止';btn.classList.remove('btn-outline-warning');btn.classList.add('btn-outline-secondary');}
          setTaskStatus(taskId,'stopped');
      })
      .catch(function(e){console.error('\u505C\u6B62\u5931\u8D25:',e);alert('\u505C\u6B62\u5931\u8D25:'+e.message);});
}

// ========== 删除任务（带确认+关联检查）==========
function deleteTask(taskId){
    if(!confirm('\u786E\u5B9A\u8981\u5220\u9664\u8BE5\u63A2\u6D4B\u4EFB\u52A1\uFF1F\u5220\u9664\u540E\u65E0\u6CD5\u6062\u590D\u3002'))return;
    var t = tasks[taskId]; if(!t) return;

    fetch(taskApiUrl(t.dbId), {
        method: 'DELETE',
        headers:{'X-CSRFToken':getCSRFToken()}
    }).then(function(r){
        if(r.status === 409){
            return r.json().then(function(data){
                throw {code:'HAS_LINKED_RECORDS', message:data.error, linked:data.linked_records||''};
            });
        }
        if(!r.ok && r.status!==204){throw new Error('\u670D\u52A1\u5668\u8FD4\u56DEHTTP '+r.status);}
        return r.status === 204 ? {} : r.json();
    })
    .then(function(data){
        // 前端清理
        if(timers[taskId]){clearInterval(timers[taskId]);delete timers[taskId];}
        delete tasks[taskId];
        var el=document.getElementById('task-'+taskId); if(el)el.remove();
        if(Object.keys(tasks).length===0)document.getElementById('emptyState').classList.remove('d-none');
        updateGlobalStats();
    })
    .catch(function(e){
        console.error('\u5220\u9664\u5931\u8D25:',e);
        if(e.code==='HAS_LINKED_RECORDS'){
            alert('\u274C '+e.message);
        } else {
            alert('\u5220\u9664\u5931\u8D25: '+(e.message||e));
        }
    });
}

// ========== 编辑任务：打开弹窗 ==========
var editingTaskId = null;
function openEditModal(taskId){
    var t = tasks[taskId]; if(!t) return;
    editingTaskId = taskId;

    document.getElementById('editDbId').value = t.dbId;
    document.getElementById('editTaskName').value = t.name;
    document.getElementById('editTargetIp').value = t.target;
    document.getElementById('editPort').value = t.port;
    document.getElementById('editInterval').value = t.interval;

    var modalEl = document.getElementById('editTaskModal');
    var modal = new bootstrap.Modal(modalEl);
    modal.show();
}

// ========== 编辑任务：保存 ==========
function saveEdit(e){
    e.preventDefault();
    if(editingTaskId == null) return false;

    var dbId = tasks[editingTaskId].dbId;
    var name   = document.getElementById('editTaskName').value.trim();
    var target = document.getElementById('editTargetIp').value.trim();
    var port   = parseInt(document.getElementById('editPort').value);
    var interval = parseInt(document.getElementById('editInterval').value);

    if (!name || !target) { alert('任务名称和目标地址不能为空'); return false; }
    if (port < 1 || port > 65535) { alert('请输入有效端口(1-65535)'); return false; }
    if (interval < 5) { alert('探测间隔不能小于5秒'); return false; }

    var btn = document.getElementById('saveEditBtn');
    btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>\u4FDD\u5B58...';

    fetch(taskApiUrl(dbId), {
        method:'PUT',
        headers:{'Content-Type':'application/json','X-CSRFToken':getCSRFToken()},
        body: JSON.stringify({action:'edit', name:name, target:target, port:port, interval:interval})
    }).then(function(r){ return r.json(); })
      .then(function(data){
          btn.disabled=false; btn.innerHTML='<i class="bi bi-check-lg me-1"></i>\u4FDD\u5B58\u4FEE\u6539';
          if(data.error){ alert(data.error); return; }

          // 更新本地状态
          var t = tasks[editingTaskId];
          t.name = name; t.target = target; t.port = port; t.interval = interval;

          // 如果间隔变了，重启探测循环
          if(t.running && !t.paused){
              if(timers[editingTaskId]){clearInterval(timers[editingTaskId]);delete timers[editingTaskId];}
              startProbeLoop(editingTaskId);
          } else if(t.running && t.paused){
              if(timers[editingTaskId]){clearInterval(timers[editingTaskId]);delete timers[editingTaskId];}
              startProbeLoopPaused(editingTaskId);
          }

          // 重新渲染行（更新名称和目标显示）
          var el = document.getElementById('task-'+dbId);
          if(el) el.remove();
          renderTaskRow(editingTaskId);

          // 恢复状态样式
          var rowStatus = data.task_status || 'running';
          if(rowStatus === 'paused') setTaskRowClass(editingTaskId, 'paused');
          else if(rowStatus === 'stopped') { setTaskRowClass(editingTaskId, 'stopped'); setTaskStatus(editingTaskId,'stopped'); }
          else if(t.lastResult) handleProbeResult(editingTaskId, t.lastResult, true);

          // 关闭弹窗
          bootstrap.Modal.getInstance(document.getElementById('editTaskModal')).hide();
          editingTaskId = null;
      })
      .catch(function(err){
          btn.disabled=false; btn.innerHTML='<i class="bi bi-check-lg me-1"></i>\u4FDD\u5B58\u4FEE\u6539';
          console.error('\u7F16\u8F91\u5931\u8D25:',err); alert('\u7F16\u8F91\u5931\u8D25: '+err.message);
      });
    return false;
}
</script>
